name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -v ./...

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o onec-mcp ./cmd/server

      - name: Generate config
        env:
          ONEC_BASE_URL: ${{ secrets.ONEC_BASE_URL }}
          ONEC_AUTH_TYPE: ${{ secrets.ONEC_AUTH_TYPE }}
          ONEC_AUTH_USERNAME: ${{ secrets.ONEC_AUTH_USERNAME }}
          ONEC_AUTH_PASSWORD: ${{ secrets.ONEC_AUTH_PASSWORD }}
          ONEC_TENANT_HEADER: ${{ secrets.ONEC_TENANT_HEADER }}
          ONEC_DEFAULT_TENANT: ${{ secrets.ONEC_DEFAULT_TENANT }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
          # OAuth — задайте OAUTH_PUBLIC_URL чтобы включить OAuth-режим (Custom Connector в Claude/ChatGPT).
          # Остальные секреты опциональны: TTL/rate-limit имеют дефолты, переопределяются только при необходимости.
          OAUTH_PUBLIC_URL: ${{ secrets.OAUTH_PUBLIC_URL }}
          OAUTH_RESOURCE: ${{ secrets.OAUTH_RESOURCE }}
          OAUTH_DB_PATH: ${{ secrets.OAUTH_DB_PATH }}
          OAUTH_ACCESS_TOKEN_TTL: ${{ secrets.OAUTH_ACCESS_TOKEN_TTL }}
          OAUTH_REFRESH_TOKEN_TTL: ${{ secrets.OAUTH_REFRESH_TOKEN_TTL }}
          OAUTH_AUTH_CODE_TTL: ${{ secrets.OAUTH_AUTH_CODE_TTL }}
          OAUTH_DEV_ACCESS_KEY: ${{ secrets.OAUTH_DEV_ACCESS_KEY }}
          OAUTH_RL_AUTHORIZE: ${{ secrets.OAUTH_RL_AUTHORIZE }}
          OAUTH_RL_REGISTER: ${{ secrets.OAUTH_RL_REGISTER }}
          OAUTH_RL_TOKEN: ${{ secrets.OAUTH_RL_TOKEN }}
        run: |
          set -x
          which yq
          yq --version

          cat > onec-mcp.yml <<'EOF'
          server:
            host: 127.0.0.1
            port: 8088

          onec:
            base_url: ""
            timeout_ms: 8000
            auth:
              type: ""
              username: ""
              password: ""
            tenant_header: ""
            default_tenant: ""

          limits:
            resolve_limit: 10
            max_rows: 5000

          mcp:
            enabled: true
            bearer_token: ""

          api:
            bearer_token: ""

          oauth:
            enabled: false
            public_url: ""
            resource: ""
            db_path: "/var/lib/onec-mcp/oauth.db"
            access_token_ttl: "1h"
            refresh_token_ttl: "720h"
            auth_code_ttl: "10m"
            default_scopes:
              - "mcp:resolve"
              - "mcp:report:sales"
              - "mcp:report:stock"
            supported_scopes:
              - "mcp:resolve"
              - "mcp:report:sales"
              - "mcp:report:stock"
              - "mcp:report:money"
              - "mcp:report:cost"
            dev_access_key: ""
            rate_limit:
              authorize_per_minute: 10
              register_per_minute: 30
              token_per_minute: 120
          EOF

          yq -i ".onec.base_url = strenv(ONEC_BASE_URL)" onec-mcp.yml
          yq -i ".onec.auth.type = strenv(ONEC_AUTH_TYPE)" onec-mcp.yml
          yq -i ".onec.auth.username = strenv(ONEC_AUTH_USERNAME)" onec-mcp.yml
          yq -i ".onec.auth.password = strenv(ONEC_AUTH_PASSWORD)" onec-mcp.yml
          yq -i ".onec.tenant_header = strenv(ONEC_TENANT_HEADER)" onec-mcp.yml
          yq -i ".onec.default_tenant = strenv(ONEC_DEFAULT_TENANT)" onec-mcp.yml
          yq -i ".mcp.bearer_token = strenv(MCP_BEARER_TOKEN)" onec-mcp.yml
          yq -i ".api.bearer_token = strenv(API_BEARER_TOKEN)" onec-mcp.yml

          # OAuth включается автоматически при заданном OAUTH_PUBLIC_URL.
          # Без него гейт остаётся в легаси-режиме со статическим MCP_BEARER_TOKEN.
          # Все блоки — явные if/then/fi, чтобы set -e не споткнулся о пустые && chains.
          if [ -n "${OAUTH_PUBLIC_URL:-}" ]; then
            yq -i ".oauth.enabled = true" onec-mcp.yml
            yq -i ".oauth.public_url = strenv(OAUTH_PUBLIC_URL)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_RESOURCE:-}" ]; then
            yq -i ".oauth.resource = strenv(OAUTH_RESOURCE)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_DB_PATH:-}" ]; then
            yq -i ".oauth.db_path = strenv(OAUTH_DB_PATH)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_ACCESS_TOKEN_TTL:-}" ]; then
            yq -i ".oauth.access_token_ttl = strenv(OAUTH_ACCESS_TOKEN_TTL)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_REFRESH_TOKEN_TTL:-}" ]; then
            yq -i ".oauth.refresh_token_ttl = strenv(OAUTH_REFRESH_TOKEN_TTL)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_AUTH_CODE_TTL:-}" ]; then
            yq -i ".oauth.auth_code_ttl = strenv(OAUTH_AUTH_CODE_TTL)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_DEV_ACCESS_KEY:-}" ]; then
            yq -i ".oauth.dev_access_key = strenv(OAUTH_DEV_ACCESS_KEY)" onec-mcp.yml
          fi
          # rate-limit — числа, env() в yq парсит значение в int
          if [ -n "${OAUTH_RL_AUTHORIZE:-}" ]; then
            yq -i ".oauth.rate_limit.authorize_per_minute = env(OAUTH_RL_AUTHORIZE)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_RL_REGISTER:-}" ]; then
            yq -i ".oauth.rate_limit.register_per_minute = env(OAUTH_RL_REGISTER)" onec-mcp.yml
          fi
          if [ -n "${OAUTH_RL_TOKEN:-}" ]; then
            yq -i ".oauth.rate_limit.token_per_minute = env(OAUTH_RL_TOKEN)" onec-mcp.yml
          fi

          echo "=== generated config ==="
          # Скрываем секреты в логе — печатаем структуру без значений строковых полей
          yq '(.. | select(tag == "!!str")) = "***"' onec-mcp.yml

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "onec-mcp,onec-mcp.yml,deploy/onec-mcp.service"
          target: /tmp/onec-mcp-deploy/
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo mkdir -p /etc/conf
            sudo mkdir -p /opt/onec-mcp
            # Постоянный каталог для SQLite OAuth-хранилища. Содержит клиентов и активные токены —
            # сохраняется между деплоями, чтобы пользователи не пере-логинивались каждый раз.
            sudo mkdir -p /var/lib/onec-mcp
            sudo chmod 700 /var/lib/onec-mcp

            sudo systemctl stop onec-mcp || true

            sudo cp /tmp/onec-mcp-deploy/onec-mcp /opt/onec-mcp/onec-mcp
            sudo chmod +x /opt/onec-mcp/onec-mcp

            sudo cp /tmp/onec-mcp-deploy/onec-mcp.yml /etc/conf/onec-mcp.yml
            sudo chmod 600 /etc/conf/onec-mcp.yml

            sudo cp /tmp/onec-mcp-deploy/deploy/onec-mcp.service /etc/systemd/system/onec-mcp.service
            sudo systemctl daemon-reload
            sudo systemctl enable onec-mcp
            sudo systemctl start onec-mcp

            rm -rf /tmp/onec-mcp-deploy

            sleep 2
            sudo systemctl status onec-mcp --no-pager
